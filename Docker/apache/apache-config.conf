<VirtualHost *:80>
    ServerAdmin webmaster@localhost
    DocumentRoot /var/www/vhost/rbrevrt/public_html
    
    <Directory /var/www/vhost/rbrevrt/public_html>
        Options Indexes FollowSymLinks MultiViews
        AllowOverride All
        Require all granted
    </Directory>
    
    ErrorLog ${APACHE_LOG_DIR}/error.log
    CustomLog ${APACHE_LOG_DIR}/access.log combined
</VirtualHost>