; Based on typical production settings - adjust from phpinfo
[PHP]
; Resource Limits
memory_limit = 256M
max_execution_time = 30
max_input_time = 60
max_input_vars = 1000

; File Uploads
file_uploads = On
upload_max_filesize = 64M
post_max_size = 65M
upload_tmp_dir = /tmp

; Development settings (will be overridden in production)
display_errors = On
display_startup_errors = On
error_reporting = E_ALL

; Error Handling
; display_errors = Off
; display_startup_errors = Off
; error_reporting = E_ALL & ~E_DEPRECATED & ~E_STRICT
log_errors = On
error_log = /var/log/php_errors.log

; Date
date.timezone = UTC

; Sessions
session.save_handler = files
session.save_path = /var/lib/php/sessions
session.gc_maxlifetime = 1440

; OPcache (if used)
opcache.enable = 1
opcache.memory_consumption = 128
opcache.interned_strings_buffer = 8
opcache.max_accelerated_files = 4000
opcache.revalidate_freq = 60
opcache.fast_shutdown = 1

; MySQL/MariaDB
mysqli.default_socket = /var/run/mysqld/mysqld.sock
pdo_mysql.default_socket = /var/run/mysqld/mysqld.sock

; open basedir - restrict PHP to specific directories for security, same as iHost settings
open_basedir = "/var/www/vhost/rbrevrt/public_html/:/tmp/"